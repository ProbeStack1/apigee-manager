name: CI/CD - Claude Editor Deploy to Google Cloud Run

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - cloud-run-deploy
    types: [opened, synchronize, reopened]

env:
  PROJECT_ID: probestack-prod
  SERVICE_ACCOUNT_EMAIL: github-actions-deployer@probestack-prod.iam.gserviceaccount.com
  SERVICE_NAME: apigee-manager
  REGION: us-central1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint check
        run: |
          pip install flake8
          flake8 apigee_manager.py --max-line-length=120
        continue-on-error: true

      - name: Verify app loads
        run: python -c "from apigee_manager import app; print('App loaded OK')"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/861433193200/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@probestack-prod.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }} 
          IMAGE_NAME=us-central1-docker.pkg.dev/probestack-prod/probestack-prod-apps/${{ env.SERVICE_NAME }} 
          docker build -t ${IMAGE_NAME}:${IMAGE_TAG} . 
          docker push ${IMAGE_NAME}:${IMAGE_TAG}

      - name: Deploy to Cloud Run
        run: |
          DEPLOY_SERVICE_NAME=${{ env.SERVICE_NAME }}

          gcloud run deploy ${DEPLOY_SERVICE_NAME} \
          --image=us-central1-docker.pkg.dev/probestack-prod/probestack-prod-apps/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --platform=managed \
          --region=${{ env.REGION }} \
          --allow-unauthenticated \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --timeout=300 \
          --concurrency=80 \
          --service-account=github-actions-deployer@probestack-prod.iam.gserviceaccount.com \
          --set-env-vars="PYTHONUNBUFFERED=1,USE_DEFAULT_CREDENTIALS=true" \
          --quiet

      - name: Get Service URL
        run: |
          DEPLOY_SERVICE_NAME=${{ env.SERVICE_NAME }}

          SERVICE_URL=$(gcloud run services describe ${DEPLOY_SERVICE_NAME} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Service: ${DEPLOY_SERVICE_NAME}"
          echo "URL: ${SERVICE_URL}"

      - name: Health Check
        run: |
          DEPLOY_SERVICE_NAME=${{ env.SERVICE_NAME }}

          SERVICE_URL=$(gcloud run services describe ${DEPLOY_SERVICE_NAME} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          sleep 10
          curl -f ${SERVICE_URL}/ || exit 1
