version: "3.9"

services:
  apigee-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apigee-manager
    ports:
      - "8000:8000"
    volumes:
      # Place your service-account.json in the same folder as docker-compose.yml
      - ./service-account.json:/app/service-account.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
